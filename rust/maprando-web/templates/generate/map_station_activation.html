<div class="modal" id="mapStationActivationModal" tabindex="-1" data-parent-modal="qualityOfLifeModal">
    <div class="modal-dialog modal-lg modal-fullscreen-sm-down modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5">Map station activation reveal</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body px-4 py-2">
                <div class="card">
                    <div class="card-header">Tile types</div>
                    <div class="card-body">
                        <div class="form-group row my-2">
                            <label for="mapStationActivationRevealSaves" class="col-md-7 col-lg-5 col-form-label">Save
                                stations</label>
                            <div id="mapStationActivationRevealSaves" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="map_station_activation_saves"
                                    id="mapStationActivationSavesNo" value="No" checked
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationSavesNo">No</label>
                                <input type="radio" class="btn-check" name="map_station_activation_saves"
                                    id="mapStationActivationSavesYes" value="Yes"
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationSavesYes">Yes</label>
                            </div>
                        </div>
                        <div class="form-group row my-2">
                            <label for="mapStationActivationRevealRefils" class="col-md-7 col-lg-5 col-form-label">Refil
                                stations</label>
                            <div id="mapStationActivationRevealRefils" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="map_station_activation_refils"
                                    id="mapStationActivationRefilsNo" value="No" checked
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationRefilsNo">No</label>
                                <input type="radio" class="btn-check" name="map_station_activation_refils"
                                    id="mapStationActivationRefilsYes" value="Yes"
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationRefilsYes">Yes</label>
                            </div>
                        </div>
                        <div class="form-group row my-2">
                            <label for="mapStationActivationRevealShip"
                                class="col-md-7 col-lg-5 col-form-label">Ship</label>
                            <div id="mapStationActivationRevealShip" class="col-sm-5 col-lg-4 btn-group">
                                <input type="radio" class="btn-check" name="map_station_activation_ship"
                                    id="mapStationActivationShipNo" value="No" checked
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationRefilsNo">No</label>
                                <input type="radio" class="btn-check" name="map_station_activation_ship"
                                    id="mapStationActivationShipYes" value="Yes"
                                    onchange="mapStationActivationSettingChanged()">
                                <label class="btn btn-outline-primary" for="mapStationActivationRefilsYes">Yes</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary ms-auto" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
