<!-- Button trigger modal -->
<button type="button" class="btn mr-1 px-2 py-1" data-bs-toggle="modal" data-bs-target="#doorColorsModal">
  <i class="bi bi-question-circle"></i>
</button>
<!-- Modal -->
<div class="modal" id="doorColorsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Door colors</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>This setting controls the color of ammo doors, the ones unlocked by Missiles, Supers, and Power Bombs.</p>
        <style>
          .door-colors-preview {
            width: 320px;
            height: 128px;
            image-rendering: pixelated;
          }
        </style>
        <table class="table align-middle w-auto mx-auto">
          <tbody>
            <tr>
              <th scope="row" class="border-top py-3">Vanilla</th>
              <td class="border-top py-3"><img class="door-colors-preview" loading="lazy" src="/static/modal_img/Vanilla_Doors.png" alt="Vanilla door colors"></td>
            </tr>
            <tr>
              <th scope="row" class="py-3">Vibrant</th>
              <td class="py-3"><img class="door-colors-preview" loading="lazy" src="/static/modal_img/Alt_Color_Doors.png" alt="Vibrant door colors"></td>
            </tr>
            <tr>
              <th scope="row" class="py-3">Contrast</th>
              <td class="py-3"><img class="door-colors-preview" loading="lazy" src="/static/modal_img/Alt_Color_Doors_2.png" alt="Contrast door colors"></td>
            </tr>
          </tbody>
        </table>
        <p>Note that the Vibrant and Contrast settings have side effects on colors in other places, such as in the HUD, some types of
          beam doors, and acid.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
